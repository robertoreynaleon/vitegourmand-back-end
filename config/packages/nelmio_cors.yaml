nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin:
            - 'https://vitegourmand-frontend.vercel.app'
            - 'http://localhost:3000'
            - 'http://127.0.0.1:3000'
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        expose_headers: ['Link', 'Authorization']
        max_age: 3600
    paths:
        '^/':
            allow_origin:
                - 'https://vitegourmand-frontend.vercel.app'
                - 'http://localhost:3000'
                - 'http://127.0.0.1:3000'
            allow_headers: ['Content-Type', 'Authorization']
            allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
            max_age: 3600
